# =============================================================
# Nginx — contraste.tn
# Reverse proxy vers Next.js (port 3000) et Directus (port 8055)
# =============================================================

# --- Redirection HTTP → HTTPS pour tous les domaines ---
server {
    listen 80;
    server_name contraste.tn www.contraste.tn directus.contraste.tn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- contraste.tn → redirect vers www ---
server {
    listen 443 ssl;
    server_name contraste.tn;

    ssl_certificate     /etc/letsencrypt/live/www.contraste.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.contraste.tn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.contraste.tn$request_uri;
}

# --- www.contraste.tn → Next.js :3000 ---
server {
    listen 443 ssl;
    server_name www.contraste.tn;

    ssl_certificate     /etc/letsencrypt/live/www.contraste.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.contraste.tn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Cache pour les assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# --- directus.contraste.tn → Directus CMS :8055 ---
server {
    listen 443 ssl;
    server_name directus.contraste.tn;

    ssl_certificate     /etc/letsencrypt/live/www.contraste.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.contraste.tn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Taille max upload (couvertures de livres, photos auteurs)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
