version: "3.8"

services:
  # ===========================================
  # Next.js Frontend App
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL:-https://directus.contraste.tn}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL:-https://directus.contraste.tn}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN}
    depends_on:
      directus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================
  # Directus Headless CMS
  # ===========================================
  directus:
    image: directus/directus:10.10.0
    ports:
      - "8055:8055"
    environment:
      DIRECTUS_ENV: "production"
      DIRECTUS_LOG_LEVEL: "info"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://www.contraste.tn"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_EXPOSE_HEADERS: "Content-Range"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-https://directus.contraste.tn}"
      # Database
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "${DB_DATABASE:-directus}"
      DB_USER: "${DB_USER:-directus}"
      DB_PASSWORD: "${DB_PASSWORD}"
      # Cache
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      CACHE_TTL: "300000"
      # Email (désactivé pour l'instant)
      EMAIL_ENABLED: "false"
      # Admin initial
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@contraste.tn}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      # Secrets (OBLIGATOIRE de les définir dans .env)
      SECRET: "${DIRECTUS_SECRET}"
      KEY: "${DIRECTUS_KEY}"
      # Fichiers
      STORAGE_LOCATIONS: "local"
      STORAGE_LOCAL_DRIVER: "local"
      STORAGE_LOCAL_ROOT: "/directus/uploads"
    volumes:
      - directus_uploads:/directus/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8055/server/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: "${DB_USER:-directus}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE:-directus}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Pas de port exposé à l'extérieur — interne uniquement
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-directus} -d ${DB_DATABASE:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  directus_uploads:

networks:
  app-network:
    driver: bridge
